    <div class="container">
    <h2>Contattaci</h2>
    <p>Compila il modulo per richiedere informazioni, prenotare una prova o parlare con il nostro staff.</p>

    <form class="contact-form">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Inserisci il tuo nome" required>
        <br>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
        <br>
        <label for="telefono">Telefono</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Inserisci il tuo numero">
        <br>
        <label for="messaggio">Messaggio</label>
        <textarea id="messaggio" name="messaggio" rows="5" placeholder="Scrivi qui il tuo messaggio..."
            required></textarea>

        <button type="submit">Invia Richiesta</button>

    </form>
